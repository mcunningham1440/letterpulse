{% extends "account/base.html" %}
{% load i18n %}

{% block head_title %}Password Changed{% endblock %}

{% block content %}
<div class="text-center mb-4">
    <div class="d-inline-flex align-items-center justify-content-center bg-success bg-opacity-10 rounded-circle mb-3" style="width: 64px; height: 64px;">
        <i class="bi bi-check-circle text-success" style="font-size: 1.75rem;"></i>
    </div>
</div>

<h1 class="auth-title">Password changed!</h1>
<p class="auth-subtitle">Your password has been successfully updated. You can now sign in with your new password.</p>

<a href="{% url 'account_login' %}" class="btn btn-primary">
    Sign In
</a>
{% endblock %}
