services:
  postgres:
    image: postgres:17.6-bookworm
    container_name: beehiiv_postgres
    environment:
      POSTGRES_DB: beehiiv_analytics
      POSTGRES_USER: beehiiv_user
      POSTGRES_PASSWORD: local_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
